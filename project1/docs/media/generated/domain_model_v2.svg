  <text x="160" y="820" class="x">修订说明：</text>
  <text x="160" y="854" class="x">1. 新增 AbnormalReport，补上“用户上报设备异常”在领域模型中的概念落点。</text>
  <text x="160" y="888" class="x">2. FaultRecord 可引用 AbnormalReport 作为来源，和 UC_06、UC_09 的文本与操作契约保持一致。</text>
  <text x="160" y="922" class="x">3. ChargingRequest、ChargingSession、Bill、FaultRecord 仍保留为主业务链，保证排队、充电、结算、故障处理的可追踪性。</text>
  <text x="160" y="956" class="x">4. 欠费限制体现在 Bill 状态与 UC_01/UC_07 的业务规则中，不单独拆成新的领域类。</text>
