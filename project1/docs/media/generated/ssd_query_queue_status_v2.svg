<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="640" viewBox="0 0 1300 640">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2d3748"/></marker>
    <style>
      .t{font:700 28px 'Microsoft YaHei';fill:#1a202c}
      .b{fill:#f7fafc;stroke:#2d3748;stroke-width:2.2}
      .x{font:18px 'Microsoft YaHei';fill:#2d3748}
      .l{stroke:#4a5568;stroke-width:2.2;fill:none}
      .m{stroke:#2d3748;stroke-width:2.4;fill:none;marker-end:url(#a)}
      .r{stroke:#718096;stroke-width:2.2;fill:none;stroke-dasharray:8 8;marker-end:url(#a)}
    </style>
  </defs>
  <text x="650" y="44" text-anchor="middle" class="t">UC_04 查看排队状态 SSD</text>
  <rect x="170" y="90" width="170" height="56" class="b"/><text x="255" y="124" text-anchor="middle" class="x">充电用户</text>
  <rect x="830" y="90" width="220" height="56" class="b"/><text x="940" y="124" text-anchor="middle" class="x">调度计费系统</text>
  <line x1="255" y1="146" x2="255" y2="560" class="l" stroke-dasharray="10 8"/>
  <line x1="940" y1="146" x2="940" y2="560" class="l" stroke-dasharray="10 8"/>
  <path d="M255 220 L940 220" class="m"/>
  <text x="597" y="204" text-anchor="middle" class="x">1: QueryQueueStatus(requestId)</text>
  <rect x="845" y="250" width="190" height="180" class="b"/>
  <text x="940" y="284" text-anchor="middle" class="x">系统内部处理</text>
  <text x="940" y="320" text-anchor="middle" class="x">定位 ChargingRequest</text>
  <text x="940" y="356" text-anchor="middle" class="x">读取 WaitingQueue</text>
  <text x="940" y="392" text-anchor="middle" class="x">计算当前位置与等待时间</text>
  <text x="940" y="428" text-anchor="middle" class="x">若已调度则返回预分配充电桩</text>
  <path d="M940 500 L255 500" class="r"/>
  <text x="597" y="484" text-anchor="middle" class="x">2: 返回排队号、队列位置、预计等待时间、桩分配信息</text>
</svg>
