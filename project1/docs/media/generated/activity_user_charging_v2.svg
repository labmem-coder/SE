  <text x="640" y="46" text-anchor="middle" class="t">客户使用充电服务活动图</text>
  <rect x="60" y="90" width="1160" height="1400" class="s"/>
  <line x1="360" y1="90" x2="360" y2="1490" class="s"/>
  <line x1="790" y1="90" x2="790" y2="1490" class="s"/>
  <text x="210" y="126" text-anchor="middle" class="h">充电用户</text>
  <text x="575" y="126" text-anchor="middle" class="h">调度计费系统</text>
  <text x="1005" y="126" text-anchor="middle" class="h">充电区/充电桩</text>
  <circle cx="575" cy="175" r="20" fill="#1a202c"/>
  <rect x="120" y="225" width="180" height="56" class="n"/><text x="210" y="260" text-anchor="middle" class="x">进入等候区</text><path d="M575 195 L575 253 L300 253" class="l"/>
  <rect x="120" y="315" width="180" height="70" class="n"/><text x="210" y="348" text-anchor="middle" class="x">提交充电请求</text><text x="210" y="372" text-anchor="middle" class="m">模式、目标电量、entryToken</text><path d="M210 281 L210 315" class="l"/>
