  <polygon points="575,430 655,490 575,550 495,490" class="d"/><text x="575" y="484" text-anchor="middle" class="x">具备等候区资格且</text><text x="575" y="508" text-anchor="middle" class="x">不存在逾期未支付账单？</text><path d="M575 385 L575 430" class="l"/>
  <rect x="80" y="448" width="260" height="78" class="n"/><text x="210" y="484" text-anchor="middle" class="x">返回失败原因并拒绝受理</text><text x="210" y="510" text-anchor="middle" class="m">资格不符或存在欠费限制</text><path d="M495 490 L340 490" class="l"/><text x="405" y="474" class="m">否</text>
  <rect x="430" y="590" width="290" height="70" class="n"/><text x="575" y="623" text-anchor="middle" class="x">加入对应等待队列并返回</text><text x="575" y="647" text-anchor="middle" class="m">排队号、预计等待时间</text><path d="M575 550 L575 590" class="l"/><text x="592" y="573" class="m">是</text>
  <rect x="430" y="710" width="290" height="70" class="n"/><text x="575" y="743" text-anchor="middle" class="x">持续排队位置检测与越序校验</text><text x="575" y="767" text-anchor="middle" class="m">未轮到不得入场；可暂时离开</text><path d="M575 660 L575 710" class="l"/>
  <polygon points="575,830 665,890 575,950 485,890" class="d"/><text x="575" y="884" text-anchor="middle" class="x">轮到该用户进入</text><text x="575" y="908" text-anchor="middle" class="x">充电区？</text><path d="M575 780 L575 830" class="l"/>
  <rect x="120" y="860" width="180" height="60" class="n"/><text x="210" y="896" text-anchor="middle" class="x">继续等待</text><path d="M485 890 L300 890" class="l"/><text x="384" y="874" class="m">否</text><path d="M210 920 L210 980 L485 980 L485 890" class="l"/>
  <rect x="430" y="1010" width="290" height="70" class="n"/><text x="575" y="1043" text-anchor="middle" class="x">发送叫号通知并预留入场资格</text><text x="575" y="1067" text-anchor="middle" class="m">要求 5 分钟内确认入场</text><path d="M575 950 L575 1010" class="l"/><text x="592" y="974" class="m">是</text>
  <polygon points="210,1035 300,1095 210,1155 120,1095" class="d"/><text x="210" y="1089" text-anchor="middle" class="x">用户按时进入</text><text x="210" y="1113" text-anchor="middle" class="x">充电区？</text><path d="M430 1045 L300 1080" class="l"/>
  <rect x="95" y="1210" width="230" height="70" class="n"/><text x="210" y="1243" text-anchor="middle" class="x">超时取消请求并释放预留资源</text><text x="210" y="1267" text-anchor="middle" class="m">记录一次爽约</text><path d="M210 1155 L210 1210" class="l"/><text x="226" y="1184" class="m">否</text>
  <rect x="900" y="1090" width="210" height="60" class="n"/><text x="1005" y="1126" text-anchor="middle" class="x">用户入场并开始充电</text><path d="M300 1095 L900 1120" class="l"/><text x="618" y="1101" class="m">是</text>
  <polygon points="1005,1200 1095,1260 1005,1320 915,1260" class="d"/><text x="1005" y="1254" text-anchor="middle" class="x">达到目标电量</text><text x="1005" y="1278" text-anchor="middle" class="x">或主动结束？</text><path d="M1005 1150 L1005 1200" class="l"/>
  <path d="M915 1260 L850 1260 L850 1120 L900 1120" class="l"/><text x="860" y="1242" class="m">否</text>
  <rect x="900" y="1360" width="210" height="70" class="n"/><text x="1005" y="1393" text-anchor="middle" class="x">结束充电并立即释放充电桩</text><text x="1005" y="1417" text-anchor="middle" class="m">生成账单，用户可稍后支付</text><path d="M1005 1320 L1005 1360" class="l"/><text x="1020" y="1344" class="m">是</text>
  <rect x="120" y="1360" width="180" height="70" class="n"/><text x="210" y="1393" text-anchor="middle" class="x">查看账单并完成支付</text><text x="210" y="1417" text-anchor="middle" class="m">逾期未支付则下次受限</text><path d="M900 1395 L300 1395" class="l"/>
  <circle cx="210" cy="1470" r="22" fill="#1a202c"/><circle cx="210" cy="1470" r="12" fill="#ffffff"/><path d="M210 1430 L210 1448" class="l"/>
